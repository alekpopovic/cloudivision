apiVersion: cicd.cloudivision.io/v1alpha1
kind: BuildRun
metadata:
  name: sample-buildrun
spec:
  projectRef: sample-project
  repositoryRef: sample-repository
  pipelineTemplateRef: sample-template
  revision: main
  branch: main
  commitSHA: example
  triggeredBy:
    type: manual
    actor: developer
  image:
    repository: ghcr.io/cloudivision/example
    tag: main
  params:
    environment: dev
  executor: job
  gitOps:
    enabled: true
    repoURL: https://github.com/cloudivision/gitops-example.git
    branch: main
    path: apps/example
    strategy: kustomize-image
    environmentRef: sample-environment

apiVersion: cicd.cloudivision.io/v1alpha1
kind: Repository
metadata:
  name: sample-repository
spec:
  projectRef: sample-project
  provider: github
  url: https://github.com/cloudivision/example-app.git
  defaultBranch: main
  credentialSecretRef:
    name: sample-git-credentials
    key: token
  webhook:
    enabled: true
    secretRef:
      name: sample-webhook-secret
      key: secret
    events:
      - push
      - pull_request
  pipelineTemplateRef: sample-template

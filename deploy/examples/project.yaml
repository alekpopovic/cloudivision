apiVersion: cicd.cloudivision.io/v1alpha1
kind: Project
metadata:
  name: demo-project
  namespace: cloudivision
spec:
  displayName: Demo Project
  description: Local kind quickstart project
  ownerTeam: platform
  namespace: cloudivision
  defaultRegistry: localhost:5001
  defaultBranch: main
  serviceAccountName: cloudivision-runner
  isolation:
    createNamespace: true
    podSecurityLevel: restricted
    networkPolicyMode: disabled

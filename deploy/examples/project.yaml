apiVersion: cicd.cloudivision.io/v1alpha1
kind: Project
metadata:
  name: sample-project
spec:
  displayName: Sample Project
  description: Example project managed by cloudivision
  ownerTeam: platform
  namespace: sample-project
  defaultRegistry: ghcr.io/cloudivision
  defaultBranch: main
  serviceAccountName: sample-builder
  isolation:
    createNamespace: true
    podSecurityLevel: restricted
    networkPolicyMode: defaultDeny

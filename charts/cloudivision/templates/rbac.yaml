apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudivision.fullname" . }}-controller
  labels:
    {{- include "cloudivision.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
  - apiGroups: ["cicd.cloudivision.io"]
    resources: ["projects", "repositories", "pipelinetemplates", "buildruns", "environments", "releases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cicd.cloudivision.io"]
    resources: ["projects/status", "buildruns/status", "releases/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["cicd.cloudivision.io"]
    resources: ["buildruns/finalizers", "projects/finalizers", "releases/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cloudivision.fullname" . }}-controller
  labels:
    {{- include "cloudivision.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cloudivision.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudivision.fullname" . }}-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cloudivision.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudivision.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
rules:
  - apiGroups: ["cicd.cloudivision.io"]
    resources: ["projects", "repositories", "pipelinetemplates", "buildruns", "environments", "releases"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cloudivision.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudivision.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cloudivision.fullname" . }}-api
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudivision.fullname" . }}-api
    namespace: {{ .Release.Namespace }}

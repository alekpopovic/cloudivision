{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "cloudivision.labels" . | nindent 4 }}
    {{- if .Values.namespace.podSecurity.enabled }}
    pod-security.kubernetes.io/enforce: {{ .Values.namespace.podSecurity.level | quote }}
    pod-security.kubernetes.io/audit: {{ .Values.namespace.podSecurity.level | quote }}
    pod-security.kubernetes.io/warn: {{ .Values.namespace.podSecurity.level | quote }}
    {{- end }}
{{- end }}

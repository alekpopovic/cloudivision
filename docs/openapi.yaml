openapi: 3.0.3
info:
  title: cloudivision API
  version: 0.1.0
  description: Thin HTTP API over cloudivision Kubernetes CRDs.
paths:
  /healthz:
    get:
      responses:
        "200":
          description: API process is healthy.
  /readyz:
    get:
      responses:
        "200":
          description: API process is ready.
  /metrics:
    get:
      responses:
        "200":
          description: Prometheus metrics when API metrics are enabled.
  /api/v1/projects:
    get:
      responses:
        "200":
          description: List Project resources.
    post:
      responses:
        "201":
          description: Create a Project resource.
  /api/v1/projects/{name}:
    get:
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Get a Project resource.
  /api/v1/repositories:
    get:
      responses:
        "200":
          description: List Repository resources.
    post:
      responses:
        "201":
          description: Create a Repository resource.
  /api/v1/pipeline-templates:
    get:
      responses:
        "200":
          description: List PipelineTemplate resources.
    post:
      responses:
        "201":
          description: Create a PipelineTemplate resource.
  /api/v1/build-runs:
    get:
      responses:
        "200":
          description: List BuildRun resources and status.
    post:
      responses:
        "201":
          description: Create a BuildRun resource.
  /api/v1/build-runs/{namespace}/{name}:
    get:
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Get a BuildRun resource and status.
  /api/v1/build-runs/{namespace}/{name}/logs:
    get:
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: tailLines
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Return runner pod logs for a BuildRun.
  /api/v1/environments:
    get:
      responses:
        "200":
          description: List Environment resources.
  /api/v1/releases:
    get:
      responses:
        "200":
          description: List Release resources.
  /api/v1/releases/{namespace}/{name}/approve:
    post:
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseApprovalRequest"
      responses:
        "200":
          description: Approve a Release that requires approval.
        "409":
          description: Release is already rejected, failed, deploying or deployed.
  /api/v1/releases/{namespace}/{name}/reject:
    post:
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseApprovalRequest"
      responses:
        "200":
          description: Reject a Release that requires approval.
        "409":
          description: Release is already rejected, failed, deploying or deployed.
  /api/v1/audit/events:
    get:
      parameters:
        - name: project
          in: query
          required: false
          schema:
            type: string
        - name: buildRun
          in: query
          required: false
          schema:
            type: string
        - name: release
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List audit events from the configured audit event store. Returns an empty list when no event lister is configured.
  /api/v1/webhooks/github/{repositoryName}:
    post:
      parameters:
        - name: repositoryName
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Create a BuildRun from a verified GitHub push event.
  /api/v1/webhooks/gitlab/{repositoryName}:
    post:
      parameters:
        - name: repositoryName
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Create a BuildRun from a verified GitLab push event.
  /api/v1/webhooks/gitea/{repositoryName}:
    post:
      parameters:
        - name: repositoryName
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Create a BuildRun from a verified Gitea push event. Supports X-Gitea-Signature HMAC SHA256 and X-Gitea-Token token mode.
  /api/v1/webhooks/generic/{repositoryName}:
    post:
      parameters:
        - name: repositoryName
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Create a BuildRun from a verified generic push event.
components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
          description: Request ID for correlating API errors with server logs.
    ReleaseApprovalRequest:
      type: object
      required:
        - actor
      properties:
        actor:
          type: string
        comment:
          type: string

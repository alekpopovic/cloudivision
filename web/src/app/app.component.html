<div class="min-h-screen bg-slate-50 text-slate-950">
  <aside class="fixed inset-y-0 left-0 hidden w-64 border-r border-slate-200 bg-white px-4 py-5 lg:block">
    <a routerLink="/dashboard" class="block text-xl font-semibold">cloudivision</a>
    <nav class="mt-8 space-y-1">
      <a
        *ngFor="let item of nav"
        [routerLink]="item.path"
        routerLinkActive="bg-emerald-50 text-emerald-800"
        class="block rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
      >
        {{ item.label }}
      </a>
    </nav>
  </aside>

  <div class="lg:pl-64">
    <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/95 px-4 py-3 backdrop-blur">
      <div class="flex items-center justify-between">
        <a routerLink="/dashboard" class="text-lg font-semibold lg:hidden">cloudivision</a>
        <nav class="hidden gap-2 md:flex lg:hidden">
          <a *ngFor="let item of nav" [routerLink]="item.path" class="rounded-md px-2 py-1 text-xs text-slate-600">{{ item.label }}</a>
        </nav>
        <div class="flex items-center gap-3 text-xs text-slate-600" *ngIf="currentUser$ | async as currentUser; else anonymous">
          <span class="font-medium">{{ currentUser.displayName || currentUser.email || currentUser.subject }}</span>
          <span class="rounded bg-amber-100 px-2 py-1 font-medium text-amber-800" *ngIf="currentUser.devMode">development auth</span>
        </div>
        <ng-template #anonymous>
          <span class="text-xs font-medium uppercase text-slate-500">Kubernetes-native CI/CD</span>
        </ng-template>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <router-outlet />
    </main>
  </div>
</div>
